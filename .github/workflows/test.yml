name: "\U0001F9EA Test & Coverage"

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "20"
      pnpm-version:
        description: "pnpm version"
        type: string
        default: "9"
      build-before-test:
        description: "Run pnpm build before tests"
        type: boolean
        default: false
      test-command:
        description: "Test command to run"
        type: string
        default: "pnpm test:coverage"
    secrets:
      NPM_TOKEN:
        required: false

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure npm registry
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      - name: Install dependencies
        run: pnpm install

      - name: Build
        if: ${{ inputs.build-before-test }}
        run: pnpm build

      - name: Run tests with coverage
        run: ${{ inputs.test-command }}

      - name: Extract coverage percentage
        if: always()
        id: coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            TOTAL=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(Math.round(c.total.lines.pct))")
            echo "pct=$TOTAL" >> $GITHUB_OUTPUT
            if [ "$TOTAL" -ge 80 ]; then
              echo "color=brightgreen" >> $GITHUB_OUTPUT
            elif [ "$TOTAL" -ge 60 ]; then
              echo "color=green" >> $GITHUB_OUTPUT
            elif [ "$TOTAL" -ge 40 ]; then
              echo "color=yellow" >> $GITHUB_OUTPUT
            else
              echo "color=red" >> $GITHUB_OUTPUT
            fi
          else
            echo "pct=0" >> $GITHUB_OUTPUT
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "![Coverage](https://img.shields.io/badge/coverage-${{ steps.coverage.outputs.pct }}%25-${{ steps.coverage.outputs.color }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              console.log('| Metric | Percentage |');
              console.log('|--------|-----------|');
              console.log('| Lines | ' + c.lines.pct + '% |');
              console.log('| Functions | ' + c.functions.pct + '% |');
              console.log('| Branches | ' + c.branches.pct + '% |');
              console.log('| Statements | ' + c.statements.pct + '% |');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
